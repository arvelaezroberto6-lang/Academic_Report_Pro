<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Report Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen p-4">
    <div class="container mx-auto max-w-2xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">📚 Academic Report Pro</h1>
            <p class="text-gray-600">Genera informes académicos profesionales con IA</p>
        </div>
        
        <div class="bg-white rounded-xl shadow-lg p-6">
            <div class="mb-4">
                <label class="block font-bold mb-1">Tema del informe *</label>
                <input type="text" id="tema" class="w-full p-2 border rounded-lg" placeholder="Ej: Impacto de la inteligencia artificial">
            </div>
            <div class="mb-4">
                <label class="block font-bold mb-1">Tu nombre *</label>
                <input type="text" id="nombre" class="w-full p-2 border rounded-lg" placeholder="Tu nombre completo">
            </div>
            <div class="mb-4">
                <label class="block font-bold mb-1">Información adicional (opcional)</label>
                <textarea id="infoExtra" rows="3" class="w-full p-2 border rounded-lg" placeholder="Escribe aquí información específica..."></textarea>
            </div>
            <button id="generarBtn" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition">🚀 Generar Informe PDF</button>
        </div>
    </div>

    <script>
        document.getElementById('generarBtn').onclick = async () => {
            const tema = document.getElementById('tema').value.trim();
            const nombre = document.getElementById('nombre').value.trim();
            
            if (!tema) { Swal.fire('Error', 'Escribe el tema del informe', 'error'); return; }
            if (!nombre) { Swal.fire('Error', 'Ingresa tu nombre', 'error'); return; }
            
            Swal.fire({ title: 'Generando informe...', text: 'Esto puede tomar 30-60 segundos', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            
            try {
                const response = await fetch('/generar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        tema: tema,
                        texto_usuario: document.getElementById('infoExtra').value,
                        nombre: nombre
                    })
                });
                
                if (response.ok) {
                    const blob = await response.blob();
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `informe_${Date.now()}.pdf`;
                    a.click();
                    URL.revokeObjectURL(url);
                    Swal.fire('¡Completado!', 'Informe descargado', 'success');
                } else {
                    const error = await response.json();
                    Swal.fire('Error', error.error || 'No se pudo generar', 'error');
                }
            } catch (error) {
                Swal.fire('Error', 'Error de conexión', 'error');
            }
        };
    </script>
</body>
</html>
