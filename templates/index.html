<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Report Pro | Generador de Informes Académicos con IA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    
    <style>
        html { scroll-behavior: smooth; }
        .bg-grid { background-image: radial-gradient(circle at 1px 1px, rgba(0,0,0,0.05) 1px, transparent 0); background-size: 32px 32px; }
        .dark .bg-grid { background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.05) 1px, transparent 0); }
        .input-modern {
            width: 100%;
            padding: 12px 16px;
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            transition: all 0.3s ease;
            outline: none;
        }
        .dark .input-modern {
            background-color: #1e293b;
            border-color: #334155;
            color: #f1f5f9;
        }
        .input-modern:focus {
            background-color: white;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }
        .btn-agregar {
            background-color: #3b82f6;
            color: white;
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        .btn-agregar:hover {
            background-color: #2563eb;
            transform: translateY(-1px);
        }
        .autor-tag {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background-color: #e0e7ff;
            color: #3730a3;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }
        .dark .autor-tag {
            background-color: #312e81;
            color: #c7d2fe;
        }
        .remove-autor {
            cursor: pointer;
            font-size: 12px;
            opacity: 0.7;
        }
        .remove-autor:hover {
            opacity: 1;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 font-sans">
    
    <div class="fixed inset-0 bg-grid z-[-1] opacity-50"></div>
    
    <header class="border-b border-slate-200/50 dark:border-slate-800/50 bg-white/70 dark:bg-slate-950/70 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-blue-600 to-indigo-600 rounded-xl flex items-center justify-center shadow-lg">
                    <span class="text-white text-sm font-black">AR</span>
                </div>
                <span class="font-extrabold text-xl">Academic Report Pro</span>
            </div>
            <div class="flex items-center gap-4">
                <button id="themeToggle" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">
                    <i id="themeIcon" class="fas fa-moon text-slate-600 dark:text-slate-400 text-lg"></i>
                </button>
            </div>
        </div>
    </header>
    
    <section class="max-w-4xl mx-auto px-4 py-12">
        <div class="bg-white dark:bg-slate-900 rounded-3xl shadow-2xl border border-slate-200/80 dark:border-slate-800/80 overflow-hidden">
            <div class="h-2 w-full bg-gradient-to-r from-blue-500 via-indigo-500 to-purple-500"></div>
            
            <div class="p-8">
                <h1 class="text-3xl font-bold text-center mb-8 bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent">
                    Generador de Informes con IA
                </h1>
                
                <!-- Tipo de informe -->
                <div class="mb-6">
                    <label class="block text-sm font-bold mb-2">📋 Tipo de informe</label>
                    <select id="tipoInforme" class="input-modern">
                        <option value="academico">📚 Académico general</option>
                        <option value="laboratorio">🔬 Informe de laboratorio</option>
                        <option value="empresarial">💼 Informe ejecutivo</option>
                        <option value="tesis">🎓 Tesis / Monografía</option>
                    </select>
                </div>
                
                <!-- Tema -->
                <div class="mb-6">
                    <label class="block text-sm font-bold mb-2">📌 Tema del informe</label>
                    <input type="text" id="tema" placeholder="Ej: Reconocimiento de carbohidratos, lípidos y proteínas" class="input-modern">
                </div>
                
                <!-- Información adicional para el modo rápido -->
                <div class="mb-6">
                    <label class="block text-sm font-bold mb-2">📝 Información adicional (opcional)</label>
                    <textarea id="infoAdicional" rows="4" placeholder="Ej: Procedimiento: Se usó reactivo de Benedict, lugol, Sudán III, nitrato de plata, ácido nítrico y Biuret. Resultados: positivo para glucosa (naranja), positivo para almidón (negro), positivo para lípidos (rojo), positivo para cloruros (blanco lechoso), positivo para proteínas (amarillo y violeta)..." class="input-modern resize-y"></textarea>
                </div>
                
                <!-- Autor principal -->
                <div class="mb-4">
                    <label class="block text-sm font-bold mb-2">👤 Autor principal</label>
                    <input type="text" id="nombre" placeholder="Nombre del estudiante" class="input-modern">
                </div>
                
                <!-- Autores adicionales -->
                <div class="mb-4">
                    <label class="block text-sm font-bold mb-2">👥 Autores adicionales</label>
                    <div class="flex gap-2 mb-2">
                        <input type="text" id="nuevoAutor" placeholder="Nombre del compañero" class="input-modern flex-1">
                        <button id="btnAgregarAutor" class="btn-agregar"><i class="fas fa-plus mr-1"></i> Agregar</button>
                    </div>
                    <div id="listaAutores" class="flex flex-wrap gap-2 mt-2"></div>
                </div>
                
                <!-- Asignatura, profesor, institución -->
                <div class="grid md:grid-cols-3 gap-4 mb-4">
                    <input type="text" id="asignatura" placeholder="Asignatura" class="input-modern">
                    <input type="text" id="profesor" placeholder="Profesor" class="input-modern">
                    <input type="text" id="institucion" placeholder="Institución" class="input-modern">
                </div>
                
                <!-- Fecha personalizable -->
                <div class="mb-6">
                    <label class="block text-sm font-bold mb-2">📅 Fecha de entrega</label>
                    <input type="date" id="fechaEntrega" class="input-modern">
                </div>
                
                <!-- Norma académica -->
                <div class="mb-6">
                    <label class="block text-sm font-bold mb-2">📚 Norma académica</label>
                    <select id="norma" class="input-modern">
                        <option value="apa7">APA 7ª Edición</option>
                        <option value="apa6">APA 6ª Edición</option>
                        <option value="icontec">ICONTEC (Colombia)</option>
                        <option value="vancouver">Vancouver</option>
                        <option value="chicago">Chicago</option>
                        <option value="harvard">Harvard</option>
                        <option value="mla">MLA</option>
                        <option value="ieee">IEEE</option>
                    </select>
                </div>
                
                <!-- Modo referencias -->
                <div class="mb-6">
                    <label class="block text-sm font-bold mb-2">📖 Modo referencias</label>
                    <select id="modoReferencias" class="input-modern">
                        <option value="auto">🤖 Automático (IA genera)</option>
                        <option value="manual">📝 Manual (tú escribes)</option>
                        <option value="mixto">🔄 Mixto (ambos)</option>
                    </select>
                </div>
                
                <div id="campoReferenciasManual" style="display:none;" class="mb-6">
                    <label class="block text-sm font-bold mb-2">✏️ Tus referencias</label>
                    <textarea id="referenciasManual" rows="3" placeholder="Ej: Pérez, J. (2022). Título. Editorial." class="input-modern"></textarea>
                </div>
                
                <button id="btnGenerar" class="w-full py-4 rounded-xl font-extrabold text-white bg-gradient-to-r from-blue-600 to-indigo-600 hover:shadow-xl transition-all text-lg">
                    <i class="fas fa-magic mr-2"></i> Generar Informe PDF
                </button>
                
                <div class="flex justify-center gap-6 mt-6 text-xs text-slate-500">
                    <span><i class="fas fa-lock"></i> Seguro</span>
                    <span><i class="fas fa-bolt"></i> Rápido</span>
                    <span><i class="fas fa-tag"></i> Gratis</span>
                </div>
            </div>
        </div>
    </section>
    
    <footer class="text-center py-8 text-sm text-slate-400 border-t border-slate-200 dark:border-slate-800">
        <p>Academic Report Pro — Generador de informes académicos con IA</p>
    </footer>
    
    <script>
        let autores = [];
        
        // Agregar autor
        document.getElementById('btnAgregarAutor').onclick = () => {
            const nuevoAutor = document.getElementById('nuevoAutor').value.trim();
            if (nuevoAutor && !autores.includes(nuevoAutor)) {
                autores.push(nuevoAutor);
                actualizarListaAutores();
                document.getElementById('nuevoAutor').value = '';
            }
        };
        
        function actualizarListaAutores() {
            const container = document.getElementById('listaAutores');
            container.innerHTML = '';
            autores.forEach(autor => {
                const tag = document.createElement('span');
                tag.className = 'autor-tag';
                tag.innerHTML = `${autor} <span class="remove-autor" data-autor="${autor}">✖</span>`;
                container.appendChild(tag);
            });
            
            document.querySelectorAll('.remove-autor').forEach(el => {
                el.onclick = () => {
                    autores = autores.filter(a => a !== el.getAttribute('data-autor'));
                    actualizarListaAutores();
                };
            });
        }
        
        // Tema oscuro
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        
        function setTheme(theme) {
            if (theme === 'dark') {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
                themeIcon.className = 'fas fa-sun text-yellow-400';
            } else {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
                themeIcon.className = 'fas fa-moon text-slate-600';
            }
        }
        
        if (localStorage.getItem('theme') === 'dark') setTheme('dark');
        themeToggle.addEventListener('click', () => {
            const isDark = document.documentElement.classList.contains('dark');
            setTheme(isDark ? 'light' : 'dark');
        });
        
        // Campo referencias manuales
        const modoReferencias = document.getElementById('modoReferencias');
        const campoReferenciasManual = document.getElementById('campoReferenciasManual');
        
        function toggleCampoReferencias() {
            campoReferenciasManual.style.display = (modoReferencias.value === 'manual' || modoReferencias.value === 'mixto') ? 'block' : 'none';
        }
        modoReferencias.addEventListener('change', toggleCampoReferencias);
        toggleCampoReferencias();
        
        // Generar informe
        document.getElementById('btnGenerar').onclick = async () => {
            const tema = document.getElementById('tema').value.trim();
            if (!tema) {
                Swal.fire('Error', 'Por favor ingresa un tema', 'error');
                return;
            }
            
            Swal.fire({ title: 'Generando informe...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            
            // Formatear fecha
            let fechaEntrega = document.getElementById('fechaEntrega').value;
            if (fechaEntrega) {
                const [year, month, day] = fechaEntrega.split('-');
                fechaEntrega = `${day}/${month}/${year}`;
            }
            
            const datos = {
                tema: tema,
                texto_completo: document.getElementById('infoAdicional').value,
                tipo_informe: document.getElementById('tipoInforme').value,
                nombre: document.getElementById('nombre').value,
                otros_autores: autores,
                asignatura: document.getElementById('asignatura').value,
                profesor: document.getElementById('profesor').value,
                institucion: document.getElementById('institucion').value,
                fecha_entrega: fechaEntrega,
                norma: document.getElementById('norma').value,
                modo_referencias: document.getElementById('modoReferencias').value,
                referencias_manuales: document.getElementById('referenciasManual').value
            };
            
            try {
                const response = await fetch('/generar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(datos)
                });
                const result = await response.json();
                if (result.success) {
                    Swal.fire({
                        title: '¡Informe listo!',
                        icon: 'success',
                        confirmButtonText: '<i class="fas fa-download"></i> Descargar PDF'
                    }).then(() => {
                        window.location.href = result.download_url;
                    });
                } else {
                    Swal.fire('Error', result.error, 'error');
                }
            } catch (error) {
                Swal.fire('Error', 'No se pudo generar', 'error');
            }
        };
    </script>
</body>
</html>
