{% extends "base.html" %}
{% block title %}Mi Perfil — Academic Report Pro{% endblock %}

{% block extra_css %}
<style>
.page-wrap { max-width: 680px; margin: 0 auto; padding: 3rem 1.5rem 5rem; }

.page-hd { display:flex; align-items:center; gap:1rem; margin-bottom:2rem; }
.page-hd-ico {
    width:52px; height:52px; border-radius:14px; flex-shrink:0;
    background:linear-gradient(145deg,#1a1508,#211b0a);
    border:1px solid rgba(212,168,67,.18);
    display:flex; align-items:center; justify-content:center;
}
.page-hd h1 { font-family:'Playfair Display',serif; font-size:1.6rem; font-weight:700; line-height:1.1; }
.page-hd p  { font-size:.8rem; color:var(--text2); margin-top:.3rem; }

/* ── HERO ── */
.pf-hero {
    display:flex; align-items:center; gap:1.2rem;
    padding:1.4rem 1.6rem;
    background:linear-gradient(135deg,var(--surface) 0%,#13180d 100%);
    border:1px solid rgba(212,168,67,.15);
    border-radius:var(--radius-lg); margin-bottom:1rem;
    position:relative; overflow:hidden;
}
.pf-hero::before {
    content:''; position:absolute; right:-50px; top:-50px;
    width:160px; height:160px; border-radius:50%;
    background:radial-gradient(circle,rgba(212,168,67,.07) 0%,transparent 70%);
    pointer-events:none;
}
.pf-avatar {
    width:62px; height:62px; border-radius:18px;
    background:linear-gradient(135deg,var(--gold) 0%,#8b6412 100%);
    display:flex; align-items:center; justify-content:center;
    font-size:26px; font-weight:700; color:#000; flex-shrink:0;
    box-shadow:0 6px 20px rgba(212,168,67,.22);
    font-family:'Playfair Display',serif;
}
.pf-info strong { display:block; font-size:1rem; font-weight:700; color:var(--text); }
.pf-info span   { font-size:.76rem; color:var(--text2); }
.pf-badges { display:flex; gap:.4rem; flex-wrap:wrap; margin-top:.55rem; }
.pf-badge {
    padding:.2rem .65rem; border-radius:100px; font-size:.65rem; font-weight:600;
    background:var(--gold-dim); border:1px solid rgba(212,168,67,.2); color:var(--gold);
}
.pf-member {
    margin-left:auto; text-align:right; flex-shrink:0;
}
.pf-member span { font-size:.65rem; color:var(--text3); display:block; }
.pf-member strong { font-size:.78rem; color:var(--text2); }

/* ── Widget usos del mes ── */
.uso-mes-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.1rem 1.4rem;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 1.1rem;
}
.uso-mes-ico {
    width: 42px; height: 42px; flex-shrink: 0;
    border-radius: 11px;
    background: var(--gold-dim);
    border: 1px solid rgba(212,168,67,.18);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.15rem;
}
.uso-mes-body { flex: 1; min-width: 0; }
.uso-mes-top {
    display: flex; align-items: baseline; gap: .5rem;
    margin-bottom: .35rem;
}
.uso-mes-num {
    font-size: 1.5rem; font-weight: 700;
    font-family: 'Playfair Display', serif;
    color: var(--gold); line-height: 1;
}
.uso-mes-label { font-size: .78rem; color: var(--text2); font-weight: 500; }
.uso-mes-bar-wrap {
    height: 5px; background: var(--surface2);
    border-radius: 3px; overflow: hidden;
    border: 1px solid var(--border);
}
.uso-mes-bar {
    height: 100%; border-radius: 3px;
    background: linear-gradient(90deg, var(--gold) 0%, #f0c96a 100%);
    transition: width .6s cubic-bezier(.34,1.2,.64,1);
    min-width: 4px;
}
.uso-mes-sub { font-size: .7rem; color: var(--text3); margin-top: .3rem; }

/* ── STATS GRID ── */
.stats-grid {
    display:grid; grid-template-columns:repeat(3,1fr);
    gap:.7rem; margin-bottom:.7rem;
}
.stats-grid-6 {
    display:grid; grid-template-columns:repeat(3,1fr);
    gap:.7rem; margin-bottom:1rem;
}
@media(max-width:480px){
    .stats-grid, .stats-grid-6 { grid-template-columns:repeat(2,1fr); }
}
.stat {
    background:var(--surface); border:1px solid var(--border);
    border-radius:var(--radius-lg); padding:1rem; text-align:center;
    transition:border-color .2s;
}
.stat:hover { border-color:rgba(212,168,67,.2); }
.stat strong {
    display:block; font-size:1.4rem;
    font-family:'Playfair Display',serif;
    color:var(--gold); line-height:1;
}
.stat span { font-size:.62rem; color:var(--text2); text-transform:uppercase; letter-spacing:.05em; margin-top:.3rem; display:block; }
.stat small { display:block; font-size:.62rem; color:var(--text3); margin-top:.15rem; }

/* ── HEATMAP ── */
.heatmap-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:var(--radius-lg); padding:1.4rem 1.5rem; margin-bottom:.9rem;
}
.heatmap-hd {
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:1rem;
}
.heatmap-title {
    font-size:.78rem; font-weight:700; color:var(--gold);
    text-transform:uppercase; letter-spacing:.07em;
    display:flex; align-items:center; gap:.4rem;
}
.heatmap-legend {
    display:flex; align-items:center; gap:.35rem;
    font-size:.65rem; color:var(--text3);
}
.heatmap-legend span { width:10px; height:10px; border-radius:2px; }
.heatmap-wrap { overflow-x: auto; padding-bottom:.3rem; }
.heatmap-grid {
    display:flex; gap:3px; min-width:max-content;
}
.heatmap-col { display:flex; flex-direction:column; gap:3px; }
.heatmap-cell {
    width:11px; height:11px; border-radius:2px;
    background:var(--surface2);
    cursor:default; transition:transform .12s;
}
.heatmap-cell:hover { transform:scale(1.4); }
.heatmap-cell[data-count="0"] { background: var(--surface2); }
.heatmap-cell[data-count="1"] { background: rgba(212,168,67,.25); }
.heatmap-cell[data-count="2"] { background: rgba(212,168,67,.45); }
.heatmap-cell[data-count="3"] { background: rgba(212,168,67,.65); }
.heatmap-cell[data-count="4"] { background: rgba(212,168,67,.85); }
.heatmap-cell[data-count="5"] { background: var(--gold); }
.heatmap-months {
    display:flex; gap:3px;
    font-size:.6rem; color:var(--text3); margin-bottom:.4rem;
    font-family:'JetBrains Mono',monospace; min-width:max-content;
}
.heatmap-month-label {
    width:11px; text-align:center; white-space:nowrap;
}
.streak-info {
    display:flex; gap:1.5rem; margin-top:.8rem; flex-wrap:wrap;
}
.streak-item { font-size:.75rem; color:var(--text2); }
.streak-item strong { color:var(--text); font-weight:700; }

/* ── PCARD ── */
.pcard { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:1.4rem 1.5rem; margin-bottom:.9rem; }
.pcard-hd {
    display:flex; align-items:center; gap:.5rem;
    font-weight:700; font-size:.78rem; color:var(--gold);
    text-transform:uppercase; letter-spacing:.07em;
    margin-bottom:1.2rem; padding-bottom:.8rem; border-bottom:1px solid var(--border);
}
.field { margin-bottom:.9rem; }
.field label { display:block; font-size:.7rem; font-weight:600; color:var(--text2); margin-bottom:.35rem; text-transform:uppercase; letter-spacing:.04em; }
.field input, .field select {
    width:100%; padding:.72rem 1rem;
    background:var(--surface2); border:1px solid var(--border2);
    border-radius:var(--radius); color:var(--text);
    font-family:'DM Sans',sans-serif; font-size:.88rem;
    transition:border-color .18s,box-shadow .18s; outline:none;
}
.field input:focus, .field select:focus { border-color:var(--gold); box-shadow:0 0 0 3px var(--gold-dim); }
.field select option { background:var(--surface2); }
.g2c { display:grid; grid-template-columns:1fr 1fr; gap:.8rem; }
@media(max-width:520px){ .g2c { grid-template-columns:1fr; } }

.btn-save {
    width:100%; padding:.82rem;
    background:linear-gradient(135deg,var(--gold) 0%,#9a6e18 100%);
    color:#000; font-weight:700; font-size:.88rem; border:none;
    border-radius:var(--radius); cursor:pointer; transition:all .2s;
    font-family:'DM Sans',sans-serif; margin-top:.4rem;
    display:flex; align-items:center; justify-content:center; gap:.4rem;
}
.btn-save:hover { transform:translateY(-1px); box-shadow:0 6px 24px var(--gold-glow); }
.btn-save:disabled { opacity:.5; cursor:not-allowed; transform:none; }

.btn-logout {
    width:100%; padding:.75rem; background:transparent; color:var(--red);
    font-weight:600; font-size:.85rem;
    border:1px solid rgba(224,92,92,.25); border-radius:var(--radius);
    cursor:pointer; transition:all .2s; font-family:'DM Sans',sans-serif;
}
.btn-logout:hover { background:rgba(224,92,92,.07); border-color:var(--red); }

.msg-ok  { font-size:.8rem; color:var(--green); text-align:center; margin-top:.5rem; display:none; padding:.5rem .8rem; background:rgba(82,196,138,.08); border-radius:8px; border:1px solid rgba(82,196,138,.2); }
.msg-err { font-size:.8rem; color:var(--red);   text-align:center; margin-top:.5rem; display:none; }

.no-auth { text-align:center; padding:3rem 2rem; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); }
.no-auth .ico { font-size:2.5rem; margin-bottom:1rem; }
.no-auth h3   { margin-bottom:.5rem; }
.no-auth p    { font-size:.85rem; color:var(--text2); margin-bottom:1.5rem; }

/* Skeleton */
.skel-block { background:var(--surface2); border-radius:8px; animation:pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* Norma popularity bar */
.norma-bars { display:flex; flex-direction:column; gap:.5rem; margin-top:.5rem; }
.norma-bar-row { display:flex; align-items:center; gap:.6rem; }
.norma-bar-label { width:68px; font-size:.72rem; font-family:'JetBrains Mono',monospace; color:var(--text2); flex-shrink:0; }
.norma-bar-track { flex:1; height:6px; background:var(--surface2); border-radius:3px; overflow:hidden; }
.norma-bar-fill { height:100%; border-radius:3px; background:linear-gradient(90deg,#d4a843,#f0c96a); transition:width 1s cubic-bezier(.4,0,.2,1); width:0%; }
.norma-bar-count { font-size:.68rem; color:var(--text3); font-family:'JetBrains Mono',monospace; width:20px; text-align:right; flex-shrink:0; }
</style>
{% endblock %}

{% block extra_js %}
<script>
const raw  = localStorage.getItem('arp_user');
const user = raw ? JSON.parse(raw) : null;

function inicialLetra(s){ return s ? s.charAt(0).toUpperCase() : '?'; }

function nivelCorto(v) {
    return { universitario:'Univ.', posgrado:'Posgrado', tecnico:'Técnico', colegio:'Colegio' }[v] || (v||'—');
}

function formatFechaMiembro(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleDateString('es-CO', { month:'short', year:'numeric' });
}

// ── Heatmap ─────────────────────────────────────────────────────
function buildHeatmap(actividadDiaria) {
    // actividadDiaria: { "2025-03-01": 2, "2025-03-15": 1, ... }
    const WEEKS = 26; // ~6 months
    const today = new Date();
    today.setHours(0,0,0,0);

    // Start on Sunday of the week 26 weeks ago
    const start = new Date(today);
    start.setDate(start.getDate() - WEEKS * 7 + 1);
    // Align to Sunday
    start.setDate(start.getDate() - start.getDay());

    const cells = [];
    let d = new Date(start);
    while (d <= today) {
        const key = d.toISOString().split('T')[0];
        cells.push({ date: key, count: actividadDiaria[key] || 0, day: new Date(d) });
        d.setDate(d.getDate() + 1);
    }

    // Group into columns of 7
    const cols = [];
    for (let i = 0; i < cells.length; i += 7) {
        cols.push(cells.slice(i, i + 7));
    }

    // Month labels
    const monthNames = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
    let lastMonth = -1;
    const monthLabels = cols.map(col => {
        const m = col[0].day.getMonth();
        if (m !== lastMonth) { lastMonth = m; return monthNames[m]; }
        return '';
    });

    const grid = cols.map(col =>
        `<div class="heatmap-col">${
            col.map(cell => {
                const cnt = Math.min(cell.count, 5);
                const title = cell.count > 0 ? `${cell.count} informe${cell.count>1?'s':''} el ${cell.date}` : cell.date;
                return `<div class="heatmap-cell" data-count="${cnt}" title="${title}"></div>`;
            }).join('')
        }</div>`
    ).join('');

    const monthRow = monthLabels.map((l,i) =>
        `<div class="heatmap-month-label" style="width:${11+3}px">${l}</div>`
    ).join('');

    return { grid, monthRow };
}

async function cargarPerfil() {
    if (!user) {
        document.getElementById('contenido').innerHTML = `
            <div class="no-auth">
                <div class="ico">🔐</div>
                <h3>Inicia sesión para ver tu perfil</h3>
                <p>Con una cuenta puedes guardar tus datos y acceder a todos tus informes.</p>
                <a href="/auth?next=/perfil" class="btn-gold" style="display:inline-flex;font-size:.85rem;">Iniciar sesión →</a>
            </div>`;
        return;
    }

    try {
        const _token = () => {
            const r = localStorage.getItem('arp_user');
            return r ? JSON.parse(r).access_token : null;
        };
        const _refresh = async () => {
            const raw = localStorage.getItem('arp_user');
            if (!raw) return null;
            const u = JSON.parse(raw);
            if (!u.refresh_token) return null;
            try {
                const r = await fetch('/api/auth/refresh', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ refresh_token: u.refresh_token })
                });
                const d = await r.json();
                if (d.success) {
                    localStorage.setItem('arp_user', JSON.stringify({
                        ...u, access_token: d.access_token, refresh_token: d.refresh_token
                    }));
                    return d.access_token;
                }
            } catch (_) {}
            return null;
        };
        const authFetch = async (url) => {
            let token = _token();
            let res   = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } });
            if (res.status === 401) {
                token = await _refresh();
                if (!token) {
                    localStorage.removeItem('arp_user');
                    location.href = '/auth?next=/perfil';
                    return { ok: false };
                }
                res = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } });
            }
            return res.json();
        };

        const [resPerfil, resInformes, resStats, resUsos] = await Promise.all([
            authFetch('/api/perfil'),
            authFetch('/api/mis-informes'),
            authFetch('/api/estadisticas'),
            authFetch('/api/usos-mes'),
        ]);
        const dp = resPerfil;
        const di = resInformes;
        const ds = resStats;
        const du = resUsos;

        const perfil    = dp.success ? (dp.perfil || {})              : {};
        const informes  = di.success ? (di.informes || [])            : [];
        const stats     = ds.success ? (ds.stats   || {})             : {};
        const usosMes   = du.success ? du.usos_mes  : informes.filter(i => {
            // fallback: contar localmente los del mes actual
            const d = new Date(i.created_at);
            const now = new Date();
            return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
        }).length;
        const mesNombre = du.success ? du.mes_nombre : '';

        // Compute norma usage locally from informes list as fallback
        const normaCount = {};
        informes.forEach(inf => {
            if (inf.norma) normaCount[inf.norma] = (normaCount[inf.norma]||0) + 1;
        });
        const normasSorted = Object.entries(normaCount).sort((a,b) => b[1]-a[1]);

        // Build activity heatmap from informes
        const actividadDiaria = {};
        informes.forEach(inf => {
            if (inf.created_at) {
                const key = inf.created_at.split('T')[0];
                actividadDiaria[key] = (actividadDiaria[key]||0) + 1;
            }
        });
        const { grid: heatGrid, monthRow: heatMonths } = buildHeatmap(
            stats.actividad_diaria || actividadDiaria
        );

        // Racha
        const rachaActual  = stats.racha_actual  || 0;
        const rachaMaxima  = stats.racha_maxima  || 0;
        const totalRefs    = stats.total_referencias || informes.reduce((s,i)=>s+(i.refs_total||0),0);
        const diasActivo   = stats.dias_activo   || Object.keys(actividadDiaria).length;
        const miembroDesde = perfil.created_at   || user.created_at || null;

        const p = {
            nombre:         perfil.nombre         || user.nombre || '',
            email:          user.email            || '',
            institucion:    perfil.institucion    || '',
            carrera:        perfil.carrera        || '',
            ciudad:         perfil.ciudad         || '',
            telefono:       perfil.telefono       || '',
            norma_favorita: perfil.norma_favorita || (normasSorted[0]?.[0]) || 'APA 7',
            nivel_favorito: perfil.nivel_favorito || 'universitario',
        };

        const normas  = ['APA 7','APA 6','ICONTEC','IEEE','Vancouver','Chicago','MLA','Harvard'];
        const niveles = [
            {v:'colegio',     l:'Colegio / Secundaria'},
            {v:'tecnico',     l:'Técnico / Tecnológico'},
            {v:'universitario',l:'Universitario'},
            {v:'posgrado',    l:'Posgrado / Maestría / Doctorado'},
        ];
        const badges = [
            p.norma_favorita ? `<span class="pf-badge">${p.norma_favorita}</span>` : '',
            p.nivel_favorito ? `<span class="pf-badge">${nivelCorto(p.nivel_favorito)}</span>` : '',
            p.institucion    ? `<span class="pf-badge">${p.institucion.split(' ').slice(0,3).join(' ')}</span>` : '',
        ].filter(Boolean).join('');

        // Norma bars HTML
        const maxNorma = normasSorted[0]?.[1] || 1;
        const normaBarsHtml = normasSorted.length > 0
            ? `<div class="norma-bars">${
                normasSorted.slice(0,5).map(([n,c]) => `
                    <div class="norma-bar-row">
                        <span class="norma-bar-label">${n}</span>
                        <div class="norma-bar-track">
                            <div class="norma-bar-fill" style="width:${Math.round(c/maxNorma*100)}%"></div>
                        </div>
                        <span class="norma-bar-count">${c}</span>
                    </div>`).join('')
                }</div>`
            : '<p style="font-size:.8rem;color:var(--text3);margin-top:.4rem;">Aún no has generado informes.</p>';

        document.getElementById('contenido').innerHTML = `
        <!-- Hero -->
        <div class="pf-hero">
            <div class="pf-avatar">${inicialLetra(p.nombre||p.email)}</div>
            <div class="pf-info">
                <strong>${p.nombre||'Sin nombre'}</strong>
                <span>${p.email}</span>
                <div class="pf-badges">${badges}</div>
            </div>
            ${miembroDesde ? `<div class="pf-member"><span>Miembro desde</span><strong>${formatFechaMiembro(miembroDesde)}</strong></div>` : ''}
        </div>

        <!-- Usos del mes -->
        <div class="uso-mes-card">
            <div class="uso-mes-ico">📊</div>
            <div class="uso-mes-body">
                <div class="uso-mes-top">
                    <span class="uso-mes-num">${usosMes}</span>
                    <span class="uso-mes-label">informe${usosMes !== 1 ? 's' : ''} este mes${mesNombre ? ' · ' + mesNombre : ''}</span>
                </div>
                <div class="uso-mes-bar-wrap">
                    <div class="uso-mes-bar" id="usosMesBar" style="width:${Math.min(usosMes * 10, 100)}%"></div>
                </div>
                <div class="uso-mes-sub">${
                    usosMes === 0
                        ? 'Aún no has generado informes este mes.'
                        : usosMes === 1
                            ? 'Buen comienzo — sigue generando 🚀'
                            : usosMes < 5
                                ? 'Vas bien este mes 👍'
                                : '¡Gran actividad este mes! 🔥'
                }</div>
            </div>
        </div>

        <!-- Stats principales -->\n        <div class="stats-grid">
            <div class="stat">
                <strong>${informes.length}</strong>
                <span>Informes</span>
                <small>${informes.length > 0 ? 'generados' : 'aún ninguno'}</small>
            </div>
            <div class="stat">
                <strong>${p.norma_favorita}</strong>
                <span>Norma fav.</span>
                <small>${normasSorted[0] ? `${normasSorted[0][1]} uso${normasSorted[0][1]>1?'s':''}` : 'sin datos'}</small>
            </div>
            <div class="stat">
                <strong>${nivelCorto(p.nivel_favorito)}</strong>
                <span>Nivel</span>
            </div>
        </div>

        <!-- Stats extra (solo si hay informes) -->
        ${informes.length > 0 ? `
        <div class="stats-grid-6" style="margin-bottom:1rem;">
            <div class="stat">
                <strong>${totalRefs}</strong>
                <span>Referencias</span>
                <small>bibliográficas</small>
            </div>
            <div class="stat">
                <strong>${diasActivo}</strong>
                <span>Días activo</span>
            </div>
            <div class="stat">
                <strong>${rachaActual > 0 ? rachaActual + 'd 🔥' : '—'}</strong>
                <span>Racha</span>
                <small>${rachaMaxima > 0 ? 'máx ' + rachaMaxima + 'd' : 'sin racha'}</small>
            </div>
        </div>
        ` : ''}

        <!-- Heatmap de actividad -->
        ${informes.length > 0 ? `
        <div class="heatmap-card">
            <div class="heatmap-hd">
                <div class="heatmap-title">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
                        <rect x="3" y="4" width="18" height="18" rx="2" stroke="#d4a843" stroke-width="1.8" fill="none"/>
                        <line x1="16" y1="2" x2="16" y2="6" stroke="#d4a843" stroke-width="1.8" stroke-linecap="round"/>
                        <line x1="8"  y1="2" x2="8"  y2="6" stroke="#d4a843" stroke-width="1.8" stroke-linecap="round"/>
                        <line x1="3" y1="10" x2="21" y2="10" stroke="#d4a843" stroke-width="1.2"/>
                    </svg>
                    Actividad — últimos 6 meses
                </div>
                <div class="heatmap-legend">
                    Menos
                    <span style="background:var(--surface2)"></span>
                    <span style="background:rgba(212,168,67,.25)"></span>
                    <span style="background:rgba(212,168,67,.55)"></span>
                    <span style="background:var(--gold)"></span>
                    Más
                </div>
            </div>
            <div class="heatmap-wrap">
                <div class="heatmap-months">${heatMonths}</div>
                <div class="heatmap-grid">${heatGrid}</div>
            </div>
            <div class="streak-info">
                <div class="streak-item">Racha actual: <strong>${rachaActual > 0 ? rachaActual + ' días 🔥' : 'sin racha'}</strong></div>
                <div class="streak-item">Racha máxima: <strong>${rachaMaxima > 0 ? rachaMaxima + ' días' : '—'}</strong></div>
                <div class="streak-item">Días con actividad: <strong>${diasActivo}</strong></div>
            </div>
        </div>
        ` : ''}

        <!-- Normas más usadas -->
        ${normasSorted.length > 0 ? `
        <div class="pcard" style="margin-bottom:.9rem;">
            <div class="pcard-hd">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                    <rect x="3" y="3" width="18" height="18" rx="2" stroke="#d4a843" stroke-width="1.8" fill="none"/>
                    <line x1="7" y1="8"  x2="17" y2="8"  stroke="#d4a843" stroke-width="1.5" stroke-linecap="round"/>
                    <line x1="7" y1="12" x2="14" y2="12" stroke="#d4a843" stroke-width="1.5" stroke-linecap="round"/>
                    <line x1="7" y1="16" x2="11" y2="16" stroke="#d4a843" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                Normas utilizadas
            </div>
            ${normaBarsHtml}
        </div>
        ` : ''}

        <!-- Datos personales -->
        <div class="pcard">
            <div class="pcard-hd">
                <svg width="14" height="14" viewBox="0 0 36 36" fill="none">
                    <circle cx="18" cy="13" r="6.5" stroke="#d4a843" stroke-width="2.2" fill="none"/>
                    <path d="M8 31 C8 24 28 24 28 31" stroke="#d4a843" stroke-width="2.2" fill="none" stroke-linecap="round"/>
                </svg>
                Datos personales
            </div>
            <div class="field">
                <label>Nombre completo</label>
                <input type="text" id="pNombre" value="${p.nombre}" placeholder="Tu nombre completo">
            </div>
            <div class="g2c">
                <div class="field">
                    <label>Ciudad</label>
                    <input type="text" id="pCiudad" value="${p.ciudad}" placeholder="Ej: Bogotá">
                </div>
                <div class="field">
                    <label>Teléfono (opcional)</label>
                    <input type="text" id="pTelefono" value="${p.telefono}" placeholder="Ej: 300 000 0000">
                </div>
            </div>
        </div>

        <!-- Datos académicos -->
        <div class="pcard">
            <div class="pcard-hd">
                <svg width="14" height="14" viewBox="0 0 36 36" fill="none">
                    <rect x="5" y="3" width="18" height="24" rx="3" stroke="#d4a843" stroke-width="2" fill="none"/>
                    <line x1="9" y1="10" x2="20" y2="10" stroke="#d4a843" stroke-width="1.8" stroke-linecap="round"/>
                    <line x1="9" y1="14" x2="20" y2="14" stroke="#d4a843" stroke-width="1.8" stroke-linecap="round"/>
                    <line x1="9" y1="18" x2="15" y2="18" stroke="#d4a843" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
                Datos académicos
            </div>
            <div class="field">
                <label>Institución / Universidad</label>
                <input type="text" id="pInstitucion" value="${p.institucion}" placeholder="Nombre de tu institución">
            </div>
            <div class="field">
                <label>Programa / Carrera</label>
                <input type="text" id="pCarrera" value="${p.carrera}" placeholder="Ej: Ingeniería de Sistemas">
            </div>
            <div class="g2c">
                <div class="field">
                    <label>Norma favorita</label>
                    <select id="pNorma">${normas.map(n=>`<option value="${n}" ${n===p.norma_favorita?'selected':''}>${n}</option>`).join('')}</select>
                </div>
                <div class="field">
                    <label>Nivel académico</label>
                    <select id="pNivel">${niveles.map(n=>`<option value="${n.v}" ${n.v===p.nivel_favorito?'selected':''}>${n.l}</option>`).join('')}</select>
                </div>
            </div>
            <button class="btn-save" id="btnGuardar" onclick="guardarPerfil()">💾 Guardar cambios</button>
            <div class="msg-ok"  id="msgOk">✅ Perfil actualizado correctamente.</div>
            <div class="msg-err" id="msgErr"></div>
        </div>

        <!-- Sesión -->
        <div class="pcard">
            <div class="pcard-hd">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                    <rect x="3" y="11" width="18" height="11" rx="2" stroke="#d4a843" stroke-width="2" fill="none"/>
                    <path d="M7 11V7a5 5 0 0110 0v4" stroke="#d4a843" stroke-width="2" stroke-linecap="round" fill="none"/>
                    <circle cx="12" cy="16" r="1.5" fill="#d4a843"/>
                </svg>
                Sesión activa
            </div>
            <p style="font-size:.82rem;color:var(--text2);margin-bottom:1rem;">
                Conectado como <strong style="color:var(--text)">${p.email}</strong>
            </p>
            <button class="btn-logout" onclick="cerrarSesion()">Cerrar sesión</button>
        </div>`;

        // Animate norma bars after render
        setTimeout(() => {
            document.querySelectorAll('.norma-bar-fill').forEach(el => {
                const w = el.style.width;
                el.style.width = '0%';
                setTimeout(() => el.style.width = w, 50);
            });
        }, 100);

    } catch(e) {
        document.getElementById('contenido').innerHTML = `
            <div class="no-auth">
                <div class="ico">⚠️</div>
                <h3>Error al cargar el perfil</h3>
                <p>${e.message}</p>
                <button onclick="cargarPerfil()" class="btn-gold" style="display:inline-flex;margin-top:1rem;font-size:.85rem;">Reintentar</button>
            </div>`;
    }
}

async function guardarPerfil() {
    if (!user) return;
    const btn = document.getElementById('btnGuardar');
    btn.disabled = true; btn.textContent = 'Guardando...';
    const payload = {
        nombre:         document.getElementById('pNombre').value.trim(),
        ciudad:         document.getElementById('pCiudad').value.trim(),
        telefono:       document.getElementById('pTelefono').value.trim(),
        institucion:    document.getElementById('pInstitucion').value.trim(),
        carrera:        document.getElementById('pCarrera').value.trim(),
        norma_favorita: document.getElementById('pNorma').value,
        nivel_favorito: document.getElementById('pNivel').value,
    };
    try {
        const res  = await fetch('/api/perfil', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${user.access_token}` },
            body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (data.success) {
            user.nombre = payload.nombre;
            localStorage.setItem('arp_user', JSON.stringify(user));
            document.getElementById('msgOk').style.display  = 'block';
            document.getElementById('msgErr').style.display = 'none';
            setTimeout(() => document.getElementById('msgOk').style.display = 'none', 3000);
        } else {
            document.getElementById('msgErr').textContent   = data.error || 'No se pudo guardar.';
            document.getElementById('msgErr').style.display = 'block';
        }
    } catch(e) {
        document.getElementById('msgErr').textContent   = 'Error de conexión.';
        document.getElementById('msgErr').style.display = 'block';
    } finally {
        btn.disabled = false; btn.innerHTML = '💾 Guardar cambios';
    }
}

function cerrarSesion() {
    Swal.fire({
        title: '¿Cerrar sesión?', icon: 'question', showCancelButton: true,
        confirmButtonText: 'Sí, salir', cancelButtonText: 'Cancelar',
        background: '#0e1118', color: '#eae8e1',
        confirmButtonColor: '#e05c5c', cancelButtonColor: '#3d3c38',
    }).then(r => { if (r.isConfirmed) { localStorage.removeItem('arp_user'); location.href = '/'; } });
}

cargarPerfil();
</script>
{% endblock %}
