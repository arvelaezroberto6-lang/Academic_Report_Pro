{% extends "base.html" %}
{% block title %}Mi Perfil — Academic Report Pro{% endblock %}

{% block extra_css %}
<style>
/* ══════════════════════════════════════════════
   PERFIL — Layout base
══════════════════════════════════════════════ */
.page-wrap { max-width: 700px; margin: 0 auto; padding: 3rem 1.5rem 6rem; }

/* ── Page header ── */
.page-hd { display:flex; align-items:center; gap:1rem; margin-bottom:2rem; }
.page-hd-ico {
    width:52px; height:52px; border-radius:14px; flex-shrink:0;
    background:linear-gradient(145deg,#1a1508,#211b0a);
    border:1px solid rgba(212,168,67,.18);
    display:flex; align-items:center; justify-content:center;
}
.page-hd h1 { font-family:'Playfair Display',serif; font-size:1.6rem; font-weight:700; line-height:1.1; }
.page-hd p  { font-size:.8rem; color:var(--text2); margin-top:.3rem; }

/* ── Hero ── */
.pf-hero {
    display:flex; align-items:center; gap:1.4rem;
    padding:1.5rem 1.7rem;
    background:linear-gradient(135deg,var(--surface) 0%,#13180d 100%);
    border:1px solid rgba(212,168,67,.15);
    border-radius:var(--radius-lg); margin-bottom:.8rem;
    position:relative; overflow:hidden;
}
.pf-hero::before {
    content:''; position:absolute; right:-60px; top:-60px;
    width:200px; height:200px; border-radius:50%;
    background:radial-gradient(circle,rgba(212,168,67,.08) 0%,transparent 70%);
    pointer-events:none;
}
.pf-avatar {
    width:68px; height:68px; border-radius:20px; flex-shrink:0;
    background:linear-gradient(135deg,var(--gold) 0%,#8b6412 100%);
    display:flex; align-items:center; justify-content:center;
    font-size:28px; font-weight:700; color:#000;
    box-shadow:0 8px 28px rgba(212,168,67,.28);
    font-family:'Playfair Display',serif;
    position:relative;
}
.pf-avatar-ring {
    position:absolute; inset:-3px; border-radius:23px;
    border:1.5px solid rgba(212,168,67,.3);
    animation:ring-pulse 3s ease-in-out infinite;
}
@keyframes ring-pulse { 0%,100%{opacity:.3} 50%{opacity:.9} }
.pf-info { flex:1; min-width:0; }
.pf-info strong { display:block; font-size:1.05rem; font-weight:700; color:var(--text); }
.pf-info .pf-email { font-size:.76rem; color:var(--text2); margin-top:.1rem; }
.pf-badges { display:flex; gap:.4rem; flex-wrap:wrap; margin-top:.55rem; }
.pf-badge {
    padding:.2rem .65rem; border-radius:100px; font-size:.65rem; font-weight:600;
    background:var(--gold-dim); border:1px solid rgba(212,168,67,.2); color:var(--gold);
    font-family:'JetBrains Mono',monospace;
}
.pf-member-since { font-size:.65rem; color:var(--text3); margin-top:.4rem; }

/* ── Stats row ── */
.stats-row {
    display:grid; grid-template-columns:repeat(3,1fr);
    gap:.7rem; margin-bottom:.7rem;
}
.stat {
    background:var(--surface); border:1px solid var(--border);
    border-radius:var(--radius-lg); padding:1rem; text-align:center;
    transition:border-color .2s, transform .2s;
    position:relative; overflow:hidden;
}
.stat::after {
    content:''; position:absolute; inset:0;
    background:radial-gradient(circle at 50% 0%,rgba(212,168,67,.05) 0%,transparent 70%);
    pointer-events:none;
}
.stat:hover { border-color:rgba(212,168,67,.25); transform:translateY(-1px); }
.stat strong {
    display:block; font-size:1.5rem;
    font-family:'Playfair Display',serif; color:var(--gold); line-height:1;
}
.stat span { font-size:.62rem; color:var(--text2); text-transform:uppercase; letter-spacing:.05em; margin-top:.35rem; display:block; }

/* ── Card base ── */
.pcard {
    background:var(--surface); border:1px solid var(--border);
    border-radius:var(--radius-lg); padding:1.4rem 1.5rem; margin-bottom:.9rem;
}
.pcard-hd {
    display:flex; align-items:center; gap:.5rem;
    font-weight:700; font-size:.75rem; color:var(--gold);
    text-transform:uppercase; letter-spacing:.08em;
    margin-bottom:1.2rem; padding-bottom:.85rem; border-bottom:1px solid var(--border);
}

/* ── Form fields ── */
.field { margin-bottom:.9rem; }
.field label {
    display:block; font-size:.7rem; font-weight:600; color:var(--text2);
    margin-bottom:.35rem; text-transform:uppercase; letter-spacing:.04em;
}
.field input, .field select {
    width:100%; padding:.72rem 1rem;
    background:var(--surface2); border:1px solid var(--border2);
    border-radius:var(--radius); color:var(--text);
    font-family:'DM Sans',sans-serif; font-size:.88rem;
    transition:border-color .18s,box-shadow .18s; outline:none;
}
.field input:focus, .field select:focus {
    border-color:var(--gold); box-shadow:0 0 0 3px var(--gold-dim);
}
.field select option { background:var(--surface2); }
.g2c { display:grid; grid-template-columns:1fr 1fr; gap:.8rem; }
@media(max-width:520px){ .g2c { grid-template-columns:1fr; } }

/* ── Password field with toggle ── */
.pass-wrap { position:relative; }
.pass-wrap input { padding-right:2.8rem !important; }
.pass-toggle {
    position:absolute; right:.8rem; top:50%; transform:translateY(-50%);
    background:none; border:none; cursor:pointer; color:var(--text2);
    font-size:1rem; padding:.2rem; transition:color .18s;
}
.pass-toggle:hover { color:var(--gold); }

/* ── Pass strength bar ── */
.pass-strength { height:3px; border-radius:2px; margin-top:.4rem; background:var(--border2); overflow:hidden; }
.pass-strength-bar { height:100%; border-radius:2px; transition:all .3s; width:0; }

/* ── Buttons ── */
.btn-save {
    width:100%; padding:.82rem;
    background:linear-gradient(135deg,var(--gold) 0%,#9a6e18 100%);
    color:#000; font-weight:700; font-size:.88rem; border:none;
    border-radius:var(--radius); cursor:pointer; transition:all .2s;
    font-family:'DM Sans',sans-serif; margin-top:.4rem;
    display:flex; align-items:center; justify-content:center; gap:.4rem;
}
.btn-save:hover { transform:translateY(-1px); box-shadow:0 6px 24px var(--gold-glow); }
.btn-save:disabled { opacity:.5; cursor:not-allowed; transform:none; box-shadow:none; }

.btn-outline {
    width:100%; padding:.78rem;
    background:transparent; border:1px solid var(--border2);
    color:var(--text2); font-weight:600; font-size:.86rem;
    border-radius:var(--radius); cursor:pointer; transition:all .18s;
    font-family:'DM Sans',sans-serif; margin-top:.4rem;
    display:flex; align-items:center; justify-content:center; gap:.4rem;
}
.btn-outline:hover { border-color:rgba(212,168,67,.3); color:var(--gold); }
.btn-outline:disabled { opacity:.4; cursor:not-allowed; }

.btn-logout {
    width:100%; padding:.75rem; background:transparent; color:var(--red);
    font-weight:600; font-size:.85rem;
    border:1px solid rgba(224,92,92,.25); border-radius:var(--radius);
    cursor:pointer; transition:all .2s; font-family:'DM Sans',sans-serif;
}
.btn-logout:hover { background:rgba(224,92,92,.07); border-color:var(--red); }

/* ── Spinner ── */
.btn-spinner {
    display:none; width:15px; height:15px;
    border:2px solid rgba(0,0,0,.25); border-top-color:#000;
    border-radius:50%; animation:spin .6s linear infinite;
}
.btn-spinner.light { border-color:rgba(255,255,255,.2); border-top-color:var(--text2); }
@keyframes spin { to { transform:rotate(360deg); } }

/* ── Messages ── */
.msg-ok  { font-size:.8rem; color:var(--green); text-align:center; margin-top:.6rem; display:none; }
.msg-err { font-size:.8rem; color:var(--red);   text-align:center; margin-top:.6rem; display:none; }
.msg-box {
    border-radius:var(--radius); padding:.75rem 1rem; font-size:.82rem;
    margin-bottom:.9rem; display:none; line-height:1.5;
}
.msg-box.ok  { background:rgba(82,196,138,.1); border:1px solid rgba(82,196,138,.25); color:var(--green); }
.msg-box.err { background:rgba(224,92,92,.1);  border:1px solid rgba(224,92,92,.25);  color:var(--red); }

/* ── No-auth ── */
.no-auth { text-align:center; padding:3rem 2rem; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); }
.no-auth .ico { font-size:2.5rem; margin-bottom:1rem; }
.no-auth h3   { margin-bottom:.5rem; }
.no-auth p    { font-size:.85rem; color:var(--text2); margin-bottom:1.5rem; }

/* ══════════════════════════════════════════════
   HEATMAP DE ACTIVIDAD
══════════════════════════════════════════════ */
.heatmap-wrap { overflow-x:auto; padding-bottom:.5rem; }
.heatmap-grid {
    display:inline-grid;
    grid-template-rows: repeat(7, 10px);
    grid-auto-flow: column;
    gap:3px;
    min-width:100%;
}
.hm-cell {
    width:10px; height:10px; border-radius:2.5px;
    background:var(--surface2);
    border:1px solid rgba(255,255,255,.04);
    transition:transform .12s;
    cursor:default;
}
.hm-cell:hover { transform:scale(1.5); z-index:2; }
.hm-cell[data-n="1"] { background:rgba(212,168,67,.25); border-color:rgba(212,168,67,.15); }
.hm-cell[data-n="2"] { background:rgba(212,168,67,.45); border-color:rgba(212,168,67,.25); }
.hm-cell[data-n="3"] { background:rgba(212,168,67,.68); border-color:rgba(212,168,67,.38); }
.hm-cell[data-n="4"] { background:rgba(212,168,67,.88); border-color:rgba(212,168,67,.5);  }
.hm-cell[data-n="5"] { background:var(--gold);           border-color:var(--gold); }
.heatmap-legend {
    display:flex; align-items:center; gap:.35rem;
    font-size:.64rem; color:var(--text3); margin-top:.7rem; justify-content:flex-end;
}
.hm-legend-cell {
    width:9px; height:9px; border-radius:2px;
}
.hm-months {
    display:flex; font-size:.6rem; color:var(--text3);
    margin-bottom:.35rem; gap:0; overflow:hidden;
}
.hm-month-label { flex:1; text-align:left; padding-left:2px; }

/* ══════════════════════════════════════════════
   BARRAS DE NORMAS Y TIPOS
══════════════════════════════════════════════ */
.breakdown-grid { display:grid; grid-template-columns:1fr 1fr; gap:1.2rem; }
@media(max-width:480px){ .breakdown-grid { grid-template-columns:1fr; } }

.breakdown-group {}
.breakdown-title { font-size:.68rem; font-weight:700; color:var(--text2); text-transform:uppercase; letter-spacing:.06em; margin-bottom:.7rem; }
.breakdown-item { margin-bottom:.55rem; }
.breakdown-label {
    display:flex; justify-content:space-between; align-items:center;
    font-size:.74rem; color:var(--text); margin-bottom:.25rem;
}
.breakdown-label span { font-size:.67rem; color:var(--text3); font-family:'JetBrains Mono',monospace; }
.breakdown-bar { height:5px; border-radius:3px; background:var(--surface2); overflow:hidden; }
.breakdown-fill {
    height:100%; border-radius:3px;
    background:linear-gradient(90deg,var(--gold) 0%,rgba(212,168,67,.55) 100%);
    transition:width .6s cubic-bezier(.23,1,.32,1);
    width:0;
}
.breakdown-empty { font-size:.78rem; color:var(--text3); text-align:center; padding:.8rem 0; }

/* ══════════════════════════════════════════════
   ÚLTIMOS INFORMES (mini-cards)
══════════════════════════════════════════════ */
.inf-mini {
    display:flex; align-items:center; gap:.9rem;
    padding:.9rem 1rem; border:1px solid var(--border);
    border-radius:12px; background:var(--surface2);
    margin-bottom:.5rem; transition:border-color .18s, transform .18s;
    cursor:default;
}
.inf-mini:hover { border-color:rgba(212,168,67,.25); transform:translateX(2px); }
.inf-mini-ico {
    width:34px; height:34px; border-radius:9px; flex-shrink:0;
    background:var(--gold-dim); border:1px solid rgba(212,168,67,.18);
    display:flex; align-items:center; justify-content:center; font-size:14px;
}
.inf-mini-body { flex:1; min-width:0; }
.inf-mini-tema {
    font-size:.82rem; font-weight:700;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.inf-mini-meta { display:flex; gap:.4rem; margin-top:.2rem; flex-wrap:wrap; align-items:center; }
.inf-mini-badge {
    padding:.1rem .45rem; border-radius:100px; font-size:.6rem;
    font-family:'JetBrains Mono',monospace; font-weight:600;
    background:var(--surface); border:1px solid var(--border); color:var(--text2);
}
.inf-mini-badge.gold { background:var(--gold-dim); border-color:rgba(212,168,67,.2); color:var(--gold); }
.inf-mini-fecha { font-size:.65rem; color:var(--text3); margin-left:auto; white-space:nowrap; flex-shrink:0; }
.inf-mini-actions { display:flex; gap:.3rem; flex-shrink:0; }
.btn-dl-mini {
    width:28px; height:28px; border-radius:7px; border:1px solid var(--border);
    background:transparent; color:var(--text2); cursor:pointer; font-size:12px;
    display:flex; align-items:center; justify-content:center; transition:all .15s;
}
.btn-dl-mini:hover { border-color:rgba(212,168,67,.4); color:var(--gold); background:var(--gold-dim); }
.inf-mini-empty { font-size:.82rem; color:var(--text3); text-align:center; padding:1rem 0; }
.ver-todos {
    display:block; text-align:center; font-size:.78rem; color:var(--text2);
    text-decoration:none; padding:.6rem; border-radius:8px;
    border:1px solid var(--border); margin-top:.3rem; transition:all .18s;
}
.ver-todos:hover { color:var(--gold); border-color:rgba(212,168,67,.25); }

/* ══════════════════════════════════════════════
   SECCIÓN CONTRASEÑA
══════════════════════════════════════════════ */
.pass-collapse {
    overflow:hidden; max-height:0; transition:max-height .35s ease;
}
.pass-collapse.open { max-height:400px; }
.pass-divider { height:1px; background:var(--border); margin:.9rem 0; }

/* ── Skeleton ── */
.skeleton-line {
    height:12px; border-radius:6px; background:var(--surface2);
    animation:pulse 1.5s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
</style>
{% endblock %}

{% block extra_js %}
<script>
const raw  = localStorage.getItem('arp_user');
const user = raw ? JSON.parse(raw) : null;

const ICONOS_TIPO = { academico:'📄', laboratorio:'🔬', ejecutivo:'📊', tesis:'🎓', pasantia:'🏢', proyecto:'📋' };

function inicialLetra(s) { return s ? s.charAt(0).toUpperCase() : '?'; }

function nivelCorto(v) {
    return { universitario:'Univ.', posgrado:'Posgrado', tecnico:'Técnico', colegio:'Colegio' }[v] || v;
}

function formatearFecha(iso) {
    if (!iso) return '';
    return new Date(iso).toLocaleDateString('es-CO', { day:'2-digit', month:'short', year:'numeric' });
}

function formatearFechaMiembro(iso) {
    if (!iso) return '';
    return new Date(iso).toLocaleDateString('es-CO', { month:'long', year:'numeric' });
}

// ══════════════════════════════════════════════
// CARGA PRINCIPAL
// ══════════════════════════════════════════════
async function cargarPerfil() {
    if (!user) {
        document.getElementById('contenido').innerHTML = `
            <div class="no-auth">
                <div class="ico">🔐</div>
                <h3>Inicia sesión para ver tu perfil</h3>
                <p>Con una cuenta puedes guardar tus datos y acceder a todos tus informes.</p>
                <a href="/auth?next=/perfil" class="btn-gold" style="display:inline-flex;font-size:.85rem;">Iniciar sesión →</a>
            </div>`;
        return;
    }

    try {
        // Cargar perfil, informes y estadísticas en paralelo
        const [dp, di, ds] = await Promise.all([
            fetchAuth('/api/perfil'),
            fetchAuth('/api/mis-informes'),
            fetchAuth('/api/estadisticas'),
        ]);

        const perfil    = dp.success ? dp.perfil          : {};
        const informes  = di.success ? (di.informes || []) : [];
        const stats     = ds.success ? ds.stats            : {};

        // Rellenar datos con fallbacks
        const p = {
            nombre:         perfil.nombre         || user.nombre || '',
            email:          user.email            || '',
            institucion:    perfil.institucion    || '',
            carrera:        perfil.carrera        || '',
            ciudad:         perfil.ciudad         || '',
            telefono:       perfil.telefono       || '',
            norma_favorita: perfil.norma_favorita || 'APA 7',
            nivel_favorito: perfil.nivel_favorito || 'universitario',
        };

        document.getElementById('contenido').innerHTML = construirUI(p, stats, informes);

        // Animar barras y heatmap después del render
        requestAnimationFrame(() => {
            animarBarras(stats);
            renderHeatmap();
        });

    } catch(e) {
        document.getElementById('contenido').innerHTML = `
            <div class="no-auth">
                <div class="ico">⚠️</div>
                <h3>Error cargando el perfil</h3>
                <p style="color:var(--red)">${e.message}</p>
            </div>`;
    }
}

// ══════════════════════════════════════════════
// CONSTRUIR HTML COMPLETO
// ══════════════════════════════════════════════
function construirUI(p, s, informes) {
    const normas  = ['APA 7','APA 6','ICONTEC','IEEE','Vancouver','Chicago','MLA','Harvard'];
    const niveles = [
        {v:'colegio',      l:'Colegio / Secundaria'},
        {v:'tecnico',      l:'Técnico / Tecnológico'},
        {v:'universitario',l:'Universitario'},
        {v:'posgrado',     l:'Posgrado / Maestría / Doctorado'},
    ];

    const badges = [
        p.norma_favorita ? `<span class="pf-badge">${p.norma_favorita}</span>` : '',
        p.nivel_favorito ? `<span class="pf-badge">${nivelCorto(p.nivel_favorito)}</span>` : '',
        p.institucion    ? `<span class="pf-badge">${p.institucion.split(' ').slice(0,3).join(' ')}</span>` : '',
    ].filter(Boolean).join('');

    const primerInforme = s.primer_informe ? formatearFechaMiembro(s.primer_informe) : null;
    const memberSince   = primerInforme ? `Miembro desde ${primerInforme}` : '';

    // ── Últimos 3 informes ──────────────────────
    const ultimosInformes = (informes || []).slice(0, 3);
    const informesHTML = ultimosInformes.length === 0
        ? `<div class="inf-mini-empty">Aún no has generado informes. <a href="/generar" style="color:var(--gold)">¡Crea el primero!</a></div>`
        : ultimosInformes.map(inf => `
            <div class="inf-mini">
                <div class="inf-mini-ico">${ICONOS_TIPO[inf.tipo_informe] || '📄'}</div>
                <div class="inf-mini-body">
                    <div class="inf-mini-tema">${inf.tema}</div>
                    <div class="inf-mini-meta">
                        <span class="inf-mini-badge gold">${inf.norma}</span>
                        <span class="inf-mini-badge">${inf.tipo_informe}</span>
                        <span class="inf-mini-fecha">${formatearFecha(inf.created_at)}</span>
                    </div>
                </div>
                <div class="inf-mini-actions">
                    <button class="btn-dl-mini" title="Descargar PDF"  onclick="descargarRapido('${inf.id}','pdf')">📄</button>
                    <button class="btn-dl-mini" title="Descargar Word" onclick="descargarRapido('${inf.id}','word')">📝</button>
                </div>
            </div>`).join('');

    // ── Desglose normas ─────────────────────────
    const porNorma = s.informes_por_norma || {};
    const porTipo  = s.informes_por_tipo  || {};
    const maxNorma = Math.max(1, ...Object.values(porNorma));
    const maxTipo  = Math.max(1, ...Object.values(porTipo));

    const tipoLabel = { academico:'Académico', laboratorio:'Laboratorio', ejecutivo:'Ejecutivo', tesis:'Tesis', pasantia:'Pasantía', proyecto:'Proyecto' };

    const normaBarras = Object.keys(porNorma).length === 0
        ? `<div class="breakdown-empty">Sin datos aún</div>`
        : Object.entries(porNorma)
            .sort((a,b) => b[1]-a[1])
            .map(([norma, cnt]) => `
                <div class="breakdown-item">
                    <div class="breakdown-label">${norma}<span>${cnt}</span></div>
                    <div class="breakdown-bar"><div class="breakdown-fill" data-pct="${Math.round(cnt/maxNorma*100)}"></div></div>
                </div>`).join('');

    const tipoBarras = Object.keys(porTipo).length === 0
        ? `<div class="breakdown-empty">Sin datos aún</div>`
        : Object.entries(porTipo)

// HEATMAP
// ══════════════════════════════════════════════
async function renderHeatmap() {
    try {
        const data = await fetchAuth('/api/estadisticas/actividad?dias=84');
        const actividad = data.actividad || [];

        // Construir mapa fecha → cantidad
        const mapa = {};
        for (const { fecha, cantidad } of actividad) mapa[fecha] = cantidad;

        // Determinar rango: últimas 12 semanas (84 días), empezando en lunes
        const hoy    = new Date();
        hoy.setHours(0,0,0,0);
        // Retroceder hasta el lunes más cercano (12 semanas atrás)
        const diaSemana = (hoy.getDay() + 6) % 7; // 0=lunes
        const inicio = new Date(hoy);
        inicio.setDate(hoy.getDate() - diaSemana - 83);

        const totalDias = 84;
        const grid = document.getElementById('heatmapGrid');
        const meses = document.getElementById('heatmapMeses');
        if (!grid) return;

        grid.innerHTML = '';
        const semanas = Math.ceil(totalDias / 7);
        grid.style.gridTemplateColumns = `repeat(${semanas}, 10px)`;

        // Construir celdas
        let semanaActual = -1;
        let mesAnterior  = -1;
        const mesesUsados = [];

        for (let i = 0; i < totalDias; i++) {
            const d = new Date(inicio);
            d.setDate(inicio.getDate() + i);
            const semana = Math.floor(i / 7);
            const mesD   = d.getMonth();

            if (mesD !== mesAnterior) {
                mesesUsados.push({ semana, mes: d.toLocaleDateString('es-CO', { month:'short' }) });
                mesAnterior = mesD;
            }

            const fechaStr = d.toISOString().slice(0,10);
            const n = mapa[fechaStr] || 0;
            const nivel = n === 0 ? 0 : n === 1 ? 1 : n === 2 ? 2 : n <= 3 ? 3 : n <= 4 ? 4 : 5;

            const cell = document.createElement('div');
            cell.className = 'hm-cell';
            if (nivel > 0) cell.setAttribute('data-n', Math.min(nivel, 5));
            cell.title = `${fechaStr}: ${n} informe${n !== 1 ? 's' : ''}`;
            grid.appendChild(cell);
        }

        // Etiquetas de meses
        if (meses) {
            meses.innerHTML = '';
            for (let s = 0; s < semanas; s++) {
                const label = mesesUsados.find(m => m.semana === s);
                const span  = document.createElement('div');
                span.className   = 'hm-month-label';
                span.textContent = label ? label.mes : '';
                meses.appendChild(span);
            }
        }

    } catch(e) {
        // Silencioso — el heatmap no es crítico
    }
}

// DESCARGA RÁPIDA DESDE PERFIL
// ══════════════════════════════════════════════
async function descargarRapido(id, formato) {
    try {
        Swal.fire({
            title: `Preparando ${formato.toUpperCase()}…`,
            html: '<div style="color:var(--text2);font-size:.85rem">Un momento...</div>',
            allowOutsideClick: false, showConfirmButton: false,
            background:'#0e1118', color:'#eae8e1',
            didOpen: () => Swal.showLoading()
        });

        const data = await fetchAuth(`/api/informe/${id}`);
        if (!data.success) throw new Error(data.error || 'No se pudo obtener el informe');

        const endpoint = formato === 'pdf' ? '/exportar-pdf' : '/exportar-word';
        const ext      = formato === 'pdf' ? 'pdf' : 'docx';

        const exportRes = await fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ secciones: data.informe.secciones, datos_usuario: data.informe.datos_usuario })
        });
        if (!exportRes.ok) throw new Error('Error al exportar');

        const blob = await exportRes.blob();
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        const tema = (data.informe.datos_usuario?.tema || 'informe').replace(/[^a-z0-9]/gi, '_').toLowerCase().slice(0, 40);
        a.href = url; a.download = `${tema}.${ext}`; a.click();
        URL.revokeObjectURL(url);

        Swal.fire({ icon:'success', title:'¡Descargado!', timer:1400, showConfirmButton:false, background:'#0e1118', color:'#eae8e1' });
    } catch(e) {
        Swal.fire({ icon:'error', title:'Error', text:e.message, confirmButtonColor:'#d4a843', background:'#0e1118', color:'#eae8e1' });
    }
}

// GUARDAR PERFIL
// ══════════════════════════════════════════════
async function guardarPerfil() {
    if (!user) return;
    const btn = document.getElementById('btnGuardar');
    const msg = document.getElementById('msgPerfil');
    btn.disabled = true;
    document.getElementById('btnGuardarSpn').style.display = 'inline-block';
    document.getElementById('btnGuardarTxt').textContent   = 'Guardando...';
    msg.style.display = 'none';

    const payload = {
        nombre:         document.getElementById('pNombre').value.trim(),
        ciudad:         document.getElementById('pCiudad').value.trim(),
        telefono:       document.getElementById('pTelefono').value.trim(),
        institucion:    document.getElementById('pInstitucion').value.trim(),
        carrera:        document.getElementById('pCarrera').value.trim(),
        norma_favorita: document.getElementById('pNorma').value,
        nivel_favorito: document.getElementById('pNivel').value,
    };

    try {
        const data = await fetchAuth('/api/perfil', {
            method: 'PUT',
            body: JSON.stringify(payload)
        });

        if (data.success) {
            user.nombre = payload.nombre;
            localStorage.setItem('arp_user', JSON.stringify(user));
            msg.className     = 'msg-box ok';
            msg.textContent   = '✅ Perfil actualizado correctamente.';
            msg.style.display = 'block';
            setTimeout(() => { msg.style.display = 'none'; }, 3500);
        } else {
            msg.className     = 'msg-box err';
            msg.textContent   = data.error || 'No se pudo guardar.';
            msg.style.display = 'block';
        }
    } catch(e) {
        msg.className     = 'msg-box err';
        msg.textContent   = 'Error de conexión.';
        msg.style.display = 'block';
    } finally {
        btn.disabled = false;
        document.getElementById('btnGuardarSpn').style.display = 'none';
        document.getElementById('btnGuardarTxt').textContent   = '💾 Guardar cambios';
    }
}

        document.getElementById('passConfirm').value = '';
        document.getElementById('passBar').style.width = '0';
        document.getElementById('msgPass').style.display = 'none';
    }
}

function toggleVis(id, btn) {
    const inp = document.getElementById(id);
    inp.type  = inp.type === 'password' ? 'text' : 'password';
    btn.textContent = inp.type === 'password' ? '👁' : '🙈';
}

function checkPassStrength(v) {
    const bar = document.getElementById('passBar');
    let s = 0;
    if (v.length >= 8)  s++;
    if (v.length >= 12) s++;
    if (/[A-Z]/.test(v)) s++;
    if (/[0-9]/.test(v)) s++;
    if (/[^A-Za-z0-9]/.test(v)) s++;
    const c = ['#e05c5c','#f0a030','#d4a843','#52c48a','#52c48a'];
    const w = ['20%','40%','60%','85%','100%'];
    bar.style.width      = v.length ? w[Math.min(s,4)] : '0';
    bar.style.background = v.length ? c[Math.min(s,4)] : '';
}

async function cambiarContrasena() {
    const actual   = document.getElementById('passActual').value;
    const nueva    = document.getElementById('passNueva').value;
    const confirm  = document.getElementById('passConfirm').value;
    const msg      = document.getElementById('msgPass');
    msg.style.display = 'none';

    if (!actual)           { showPassMsg('err', 'Ingresa tu contraseña actual.'); return; }
    if (nueva.length < 8)  { showPassMsg('err', 'La nueva contraseña debe tener al menos 8 caracteres.'); return; }
    if (nueva !== confirm) { showPassMsg('err', 'Las contraseñas no coinciden.'); return; }
    if (nueva === actual)  { showPassMsg('err', 'La nueva contraseña debe ser diferente a la actual.'); return; }

    const btn = document.getElementById('btnCambiarPass');
    btn.disabled = true;
    document.getElementById('btnPassSpn').style.display = 'inline-block';
    document.getElementById('btnPassTxt').textContent   = 'Actualizando...';

    try {
        // Primero verificamos que la contraseña actual sea correcta haciendo login
        const verRes = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: user.email, password: actual })
        });
        const verData = await verRes.json();
        if (!verData.success) {
            showPassMsg('err', 'La contraseña actual no es correcta.');
            return;
        }

        // Ahora actualizamos con el token fresco
        const freshToken = verData.access_token;
        const updRes = await fetch('/api/auth/nueva-contrasena', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ access_token: freshToken, password: nueva })
        });
        const updData = await updRes.json();

        if (updData.success) {
            // Actualizar tokens en localStorage
            const updated = { ...user, access_token: freshToken, refresh_token: verData.refresh_token || user.refresh_token };
            localStorage.setItem('arp_user', JSON.stringify(updated));
            showPassMsg('ok', '✅ Contraseña actualizada correctamente.');
            document.getElementById('passActual').value  = '';
            document.getElementById('passNueva').value   = '';
            document.getElementById('passConfirm').value = '';
            document.getElementById('passBar').style.width = '0';
            setTimeout(() => togglePassForm(), 2000);
        } else {
            showPassMsg('err', updData.error || 'No se pudo actualizar la contraseña.');
        }
    } catch(e) {
        showPassMsg('err', 'Error de conexión. Intenta de nuevo.');
    } finally {
        btn.disabled = false;
        document.getElementById('btnPassSpn').style.display = 'none';
        document.getElementById('btnPassTxt').textContent   = 'Actualizar contraseña';
    }
}

function showPassMsg(tipo, texto) {
    const msg     = document.getElementById('msgPass');
    msg.className = `msg-box ${tipo}`;
    msg.textContent = texto;
    msg.style.display = 'block';
}

    Swal.fire({
        title: '¿Cerrar sesión?', icon: 'question', showCancelButton: true,
        confirmButtonText: 'Sí, salir', cancelButtonText: 'Cancelar',
        background: '#0e1118', color: '#eae8e1',
        confirmButtonColor: '#e05c5c', cancelButtonColor: '#3d3c38',
    }).then(r => {
        if (r.isConfirmed) {
            localStorage.removeItem('arp_user');
            location.href = '/';
        }
    });
}

// ── Arrancar ───────────────────────────────────
cargarPerfil();
</script>
{% endblock %}
