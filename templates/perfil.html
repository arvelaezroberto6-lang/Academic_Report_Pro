{% extends "base.html" %}
{% block title %}Mi Perfil — Academic Report Pro{% endblock %}

{% block extra_css %}
<style>
.page-wrap { max-width:700px; margin:0 auto; padding:3rem 1.5rem 6rem; }

/* ── HEADER ── */
.page-hd { display:flex; align-items:center; gap:1rem; margin-bottom:2rem; }
.page-hd-ico {
    width:52px; height:52px; border-radius:14px; flex-shrink:0;
    background:linear-gradient(145deg,#1a1508,#211b0a);
    border:1px solid rgba(212,168,67,.18);
    display:flex; align-items:center; justify-content:center;
}
.page-hd h1 { font-family:'Playfair Display',serif; font-size:1.6rem; font-weight:700; line-height:1.1; }
.page-hd p  { font-size:.8rem; color:var(--text2); margin-top:.3rem; }

/* ── HERO ── */
.pf-hero {
    display:flex; align-items:center; gap:1.3rem;
    padding:1.5rem 1.6rem;
    background:linear-gradient(135deg,var(--surface) 0%,#13180d 100%);
    border:1px solid rgba(212,168,67,.15);
    border-radius:var(--radius-lg); margin-bottom:1rem;
    position:relative; overflow:hidden;
}
.pf-hero::before {
    content:''; position:absolute; right:-50px; top:-50px;
    width:180px; height:180px; border-radius:50%;
    background:radial-gradient(circle,rgba(212,168,67,.07) 0%,transparent 70%);
    pointer-events:none;
}

/* Avatar */
.avatar-wrap { position:relative; display:inline-block; flex-shrink:0; }
.pf-avatar {
    width:66px; height:66px; border-radius:18px;
    background:linear-gradient(135deg,var(--gold) 0%,#8b6412 100%);
    display:flex; align-items:center; justify-content:center;
    font-size:28px; font-weight:700; color:#000;
    box-shadow:0 6px 20px rgba(212,168,67,.22);
    font-family:'Playfair Display',serif;
    cursor:pointer; transition:transform .18s;
    user-select:none;
}
.pf-avatar:hover { transform:scale(1.04); }
.avatar-edit-btn {
    position:absolute; bottom:-4px; right:-4px;
    width:22px; height:22px; border-radius:50%;
    background:var(--gold); border:2px solid var(--surface);
    display:flex; align-items:center; justify-content:center;
    font-size:.6rem; cursor:pointer; transition:transform .18s;
    pointer-events:none;
}
.avatar-wrap:hover .avatar-edit-btn { transform:scale(1.15); }

/* Avatar picker dropdown */
.avatar-picker {
    display:none; position:absolute; top:calc(100% + 10px); left:0;
    z-index:50; flex-wrap:wrap; gap:.4rem;
    padding:.9rem; width:220px;
    background:var(--surface); border:1px solid var(--border2);
    border-radius:var(--radius-lg);
    box-shadow:0 12px 40px rgba(0,0,0,.5);
}
.avatar-picker.open { display:flex; }
.avatar-picker-title {
    width:100%; font-size:.62rem; font-weight:700; color:var(--text3);
    text-transform:uppercase; letter-spacing:.07em; margin-bottom:.2rem;
}
.avatar-opt {
    width:36px; height:36px; border-radius:10px;
    display:flex; align-items:center; justify-content:center;
    font-size:1.1rem; cursor:pointer;
    border:2px solid transparent; transition:all .15s;
    background:var(--surface2);
}
.avatar-opt:hover { border-color:rgba(212,168,67,.4); transform:scale(1.1); }
.avatar-opt.selected { border-color:var(--gold); background:var(--gold-dim); }

.pf-info { flex:1; min-width:0; }
.pf-info strong { display:block; font-size:1.05rem; font-weight:700; color:var(--text); }
.pf-info span   { font-size:.76rem; color:var(--text2); }
.pf-badges { display:flex; gap:.4rem; flex-wrap:wrap; margin-top:.55rem; }
.pf-badge {
    padding:.2rem .65rem; border-radius:100px; font-size:.65rem; font-weight:600;
    background:var(--gold-dim); border:1px solid rgba(212,168,67,.2); color:var(--gold);
}
.pf-member { margin-left:auto; text-align:right; flex-shrink:0; }
.pf-member span   { font-size:.65rem; color:var(--text3); display:block; }
.pf-member strong { font-size:.78rem; color:var(--text2); }

/* ── STATS ── */
.stats-grid {
    display:grid; grid-template-columns:repeat(3,1fr);
    gap:.7rem; margin-bottom:.7rem;
}
.stats-grid-3 {
    display:grid; grid-template-columns:repeat(3,1fr);
    gap:.7rem; margin-bottom:1rem;
}
@media(max-width:480px){
    .stats-grid, .stats-grid-3 { grid-template-columns:repeat(2,1fr); }
}
.stat {
    background:var(--surface); border:1px solid var(--border);
    border-radius:var(--radius-lg); padding:1rem; text-align:center;
    transition:border-color .2s;
}
.stat:hover { border-color:rgba(212,168,67,.2); }
.stat strong {
    display:block; font-size:1.4rem;
    font-family:'Playfair Display',serif;
    color:var(--gold); line-height:1;
}
.stat span  { font-size:.62rem; color:var(--text2); text-transform:uppercase; letter-spacing:.05em; margin-top:.3rem; display:block; }
.stat small { display:block; font-size:.62rem; color:var(--text3); margin-top:.15rem; }

/* ── USOS DEL MES ── */
.uso-mes-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:var(--radius-lg); padding:1.1rem 1.4rem;
    margin-bottom:1rem; display:flex; align-items:center; gap:1.1rem;
}
.uso-mes-ico {
    width:42px; height:42px; flex-shrink:0; border-radius:11px;
    background:var(--gold-dim); border:1px solid rgba(212,168,67,.18);
    display:flex; align-items:center; justify-content:center; font-size:1.15rem;
}
.uso-mes-body { flex:1; min-width:0; }
.uso-mes-top  { display:flex; align-items:baseline; gap:.5rem; margin-bottom:.35rem; }
.uso-mes-num  { font-size:1.5rem; font-weight:700; font-family:'Playfair Display',serif; color:var(--gold); line-height:1; }
.uso-mes-label { font-size:.78rem; color:var(--text2); font-weight:500; }
.uso-mes-bar-wrap { height:5px; background:var(--surface2); border-radius:3px; overflow:hidden; border:1px solid var(--border); }
.uso-mes-bar { height:100%; border-radius:3px; background:linear-gradient(90deg,var(--gold) 0%,#f0c96a 100%); transition:width .6s cubic-bezier(.34,1.2,.64,1); min-width:4px; }
.uso-mes-sub { font-size:.7rem; color:var(--text3); margin-top:.3rem; }

/* ── HEATMAP ── */
.heatmap-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:1.4rem 1.5rem; margin-bottom:.9rem; }
.heatmap-hd   { display:flex; align-items:center; justify-content:space-between; margin-bottom:1rem; }
.heatmap-title { font-size:.78rem; font-weight:700; color:var(--gold); text-transform:uppercase; letter-spacing:.07em; display:flex; align-items:center; gap:.4rem; }
.heatmap-legend { display:flex; align-items:center; gap:.35rem; font-size:.65rem; color:var(--text3); }
.heatmap-legend span { width:10px; height:10px; border-radius:2px; }
.heatmap-wrap { overflow-x:auto; padding-bottom:.3rem; }
.heatmap-grid { display:flex; gap:3px; min-width:max-content; }
.heatmap-col  { display:flex; flex-direction:column; gap:3px; }
.heatmap-cell { width:11px; height:11px; border-radius:2px; background:var(--surface2); cursor:default; transition:transform .12s; }
.heatmap-cell:hover { transform:scale(1.4); }
.heatmap-cell[data-count="0"] { background:var(--surface2); }
.heatmap-cell[data-count="1"] { background:rgba(212,168,67,.25); }
.heatmap-cell[data-count="2"] { background:rgba(212,168,67,.45); }
.heatmap-cell[data-count="3"] { background:rgba(212,168,67,.65); }
.heatmap-cell[data-count="4"] { background:rgba(212,168,67,.85); }
.heatmap-cell[data-count="5"] { background:var(--gold); }
.heatmap-months { display:flex; gap:3px; font-size:.6rem; color:var(--text3); margin-bottom:.4rem; font-family:'JetBrains Mono',monospace; min-width:max-content; }
.streak-info    { display:flex; gap:1.5rem; margin-top:.8rem; flex-wrap:wrap; }
.streak-item    { font-size:.75rem; color:var(--text2); }
.streak-item strong { color:var(--text); font-weight:700; }

/* Norma bars */
.norma-bars { display:flex; flex-direction:column; gap:.5rem; margin-top:.5rem; }
.norma-bar-row   { display:flex; align-items:center; gap:.6rem; }
.norma-bar-label { width:68px; font-size:.72rem; font-family:'JetBrains Mono',monospace; color:var(--text2); flex-shrink:0; }
.norma-bar-track { flex:1; height:6px; background:var(--surface2); border-radius:3px; overflow:hidden; }
.norma-bar-fill  { height:100%; border-radius:3px; background:linear-gradient(90deg,#d4a843,#f0c96a); transition:width 1s cubic-bezier(.4,0,.2,1); width:0%; }
.norma-bar-count { font-size:.68rem; color:var(--text3); font-family:'JetBrains Mono',monospace; width:20px; text-align:right; flex-shrink:0; }

/* ── INFORMES RECIENTES ── */
.inf-list  { display:flex; flex-direction:column; gap:.5rem; margin-top:.2rem; }
.inf-row {
    display:flex; align-items:center; gap:.75rem;
    padding:.7rem .9rem; border-radius:10px;
    background:var(--surface2); border:1px solid var(--border);
    transition:border-color .18s; text-decoration:none;
}
.inf-row:hover { border-color:rgba(212,168,67,.25); }
.inf-row-ico {
    width:32px; height:32px; border-radius:8px; flex-shrink:0;
    background:var(--gold-dim); border:1px solid rgba(212,168,67,.15);
    display:flex; align-items:center; justify-content:center; font-size:.85rem;
}
.inf-row-body { flex:1; min-width:0; }
.inf-row-tema { font-size:.82rem; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.inf-row-meta { font-size:.68rem; color:var(--text3); margin-top:.1rem; }
.inf-row-norma {
    font-size:.65rem; font-weight:700; padding:.18rem .5rem; border-radius:100px;
    background:var(--gold-dim); color:var(--gold);
    border:1px solid rgba(212,168,67,.15); flex-shrink:0;
}
.inf-ver-todos {
    display:block; text-align:center; font-size:.75rem; color:var(--text3);
    text-decoration:none; padding:.5rem; border-radius:8px; margin-top:.3rem;
    transition:color .18s;
}
.inf-ver-todos:hover { color:var(--gold); }

/* ── PCARD ── */
.pcard { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:1.4rem 1.5rem; margin-bottom:.9rem; }
.pcard-hd {
    display:flex; align-items:center; gap:.5rem;
    font-weight:700; font-size:.78rem; color:var(--gold);
    text-transform:uppercase; letter-spacing:.07em;
    margin-bottom:1.2rem; padding-bottom:.8rem; border-bottom:1px solid var(--border);
}

/* Fields */
.field { margin-bottom:.9rem; }
.field label { display:block; font-size:.7rem; font-weight:600; color:var(--text2); margin-bottom:.35rem; text-transform:uppercase; letter-spacing:.04em; }
.field input, .field select {
    width:100%; padding:.72rem 1rem;
    background:var(--surface2); border:1px solid var(--border2);
    border-radius:var(--radius); color:var(--text);
    font-family:'DM Sans',sans-serif; font-size:.88rem;
    transition:border-color .18s,box-shadow .18s; outline:none;
}
.field input:focus, .field select:focus { border-color:var(--gold); box-shadow:0 0 0 3px var(--gold-dim); }
.field select option { background:var(--surface2); }
.g2c { display:grid; grid-template-columns:1fr 1fr; gap:.8rem; }
@media(max-width:520px){ .g2c { grid-template-columns:1fr; } }

/* Password field */
.pass-wrap-rel { position:relative; }
.pass-wrap-rel input { padding-right:2.8rem !important; }
.pass-eye {
    position:absolute; right:.8rem; top:50%; transform:translateY(-50%);
    background:none; border:none; cursor:pointer;
    color:var(--text2); font-size:1rem; padding:.2rem; transition:color .18s;
}
.pass-eye:hover { color:var(--gold); }
.pass-strength-row  { height:3px; background:var(--border2); border-radius:2px; margin-top:.4rem; overflow:hidden; }
.pass-strength-fill { height:100%; border-radius:2px; transition:all .3s; width:0; }

/* Buttons */
.btn-save {
    width:100%; padding:.82rem;
    background:linear-gradient(135deg,var(--gold) 0%,#9a6e18 100%);
    color:#000; font-weight:700; font-size:.88rem; border:none;
    border-radius:var(--radius); cursor:pointer; transition:all .2s;
    font-family:'DM Sans',sans-serif; margin-top:.4rem;
    display:flex; align-items:center; justify-content:center; gap:.4rem;
}
.btn-save:hover { transform:translateY(-1px); box-shadow:0 6px 24px var(--gold-glow); }
.btn-save:disabled { opacity:.5; cursor:not-allowed; transform:none; box-shadow:none; }
.btn-logout {
    width:100%; padding:.75rem; background:transparent; color:var(--text2);
    font-weight:600; font-size:.85rem; border:1px solid var(--border2);
    border-radius:var(--radius); cursor:pointer; transition:all .2s;
    font-family:'DM Sans',sans-serif;
}
.btn-logout:hover { border-color:rgba(224,92,92,.3); color:var(--red); background:rgba(224,92,92,.05); }

/* Danger zone */
.btn-danger {
    width:100%; padding:.75rem; background:transparent; color:var(--red);
    font-weight:600; font-size:.85rem;
    border:1px solid rgba(224,92,92,.25); border-radius:var(--radius);
    cursor:pointer; transition:all .2s; font-family:'DM Sans',sans-serif;
}
.btn-danger:hover { background:rgba(224,92,92,.07); border-color:var(--red); }
.delete-confirm {
    display:none; margin-top:.8rem; padding:.85rem 1rem;
    background:rgba(224,92,92,.06); border:1px solid rgba(224,92,92,.2);
    border-radius:var(--radius);
}
.delete-confirm p { font-size:.78rem; color:var(--text2); margin-bottom:.7rem; line-height:1.5; }
.delete-confirm input {
    width:100%; padding:.6rem .9rem; margin-bottom:.6rem;
    background:var(--surface2); border:1px solid rgba(224,92,92,.3);
    border-radius:var(--radius); color:var(--text);
    font-family:'DM Sans',sans-serif; font-size:.85rem; outline:none;
}
.delete-confirm input:focus { border-color:var(--red); box-shadow:0 0 0 3px rgba(224,92,92,.1); }
.btn-danger-confirm {
    width:100%; padding:.72rem; background:var(--red); color:#fff;
    font-weight:700; font-size:.85rem; border:none;
    border-radius:var(--radius); cursor:pointer;
    font-family:'DM Sans',sans-serif; transition:opacity .2s;
}
.btn-danger-confirm:hover   { opacity:.85; }
.btn-danger-confirm:disabled { opacity:.5; cursor:not-allowed; }

/* Messages */
.msg-ok  { font-size:.8rem; color:var(--green); text-align:center; margin-top:.5rem; display:none; padding:.5rem .8rem; background:rgba(82,196,138,.08); border-radius:8px; border:1px solid rgba(82,196,138,.2); }
.msg-err { font-size:.8rem; color:var(--red); text-align:center; margin-top:.5rem; display:none; padding:.5rem .8rem; background:rgba(224,92,92,.07); border-radius:8px; border:1px solid rgba(224,92,92,.2); }

/* No auth / error */
.no-auth { text-align:center; padding:3rem 2rem; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); }
.no-auth .ico { font-size:2.5rem; margin-bottom:1rem; }
.no-auth h3   { margin-bottom:.5rem; }
.no-auth p    { font-size:.85rem; color:var(--text2); margin-bottom:1.5rem; }

/* Skeleton */
.skel-block { background:var(--surface2); border-radius:8px; animation:pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* Section divider label */
.section-label {
    font-size:.65rem; font-weight:700; color:var(--text3);
    text-transform:uppercase; letter-spacing:.1em;
    margin:1.6rem 0 .7rem; padding-left:.2rem;
}
</style>
{% endblock %}

{% block extra_js %}
<script>
const raw  = localStorage.getItem('arp_user');
const user = raw ? JSON.parse(raw) : null;

// ── Helpers ────────────────────────────────────────────────────
function inicialLetra(s) { return s ? s.charAt(0).toUpperCase() : '?'; }
function nivelCorto(v) {
    return { universitario:'Univ.', posgrado:'Posgrado', tecnico:'Técnico', colegio:'Colegio' }[v] || (v||'—');
}
function formatFecha(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleDateString('es-CO', { day:'numeric', month:'short', year:'numeric' });
}
function formatFechaMiembro(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleDateString('es-CO', { month:'short', year:'numeric' });
}
function tipoIcon(tipo) {
    return { academico:'📄', laboratorio:'🧪', ejecutivo:'💼', tesis:'🎓', pasantia:'🏢', proyecto:'🚀' }[tipo] || '📄';
}

// ── fetchAuth con refresco automático ─────────────────────────
const _getUser = () => { const r = localStorage.getItem('arp_user'); return r ? JSON.parse(r) : null; };
const _doRefresh = async () => {
    const u = _getUser();
    if (!u?.refresh_token) return null;
    try {
        const r = await fetch('/api/auth/refresh', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ refresh_token: u.refresh_token })
        });
        const d = await r.json();
        if (d.success) {
            localStorage.setItem('arp_user', JSON.stringify({ ...u, access_token:d.access_token, refresh_token:d.refresh_token }));
            return d.access_token;
        }
    } catch(_) {}
    return null;
};
async function authFetch(url, opts = {}) {
    const u = _getUser();
    const hdrs = (tok) => ({ 'Content-Type':'application/json', ...(opts.headers||{}), ...(tok ? {'Authorization':`Bearer ${tok}`} : {}) });
    let res = await fetch(url, { ...opts, headers: hdrs(u?.access_token) });
    if (res.status !== 401) return res.json();
    const newTok = await _doRefresh();
    if (!newTok) { localStorage.removeItem('arp_user'); location.href = '/auth?next=/perfil'; return {success:false}; }
    res = await fetch(url, { ...opts, headers: hdrs(newTok) });
    return res.json();
}

// ── Heatmap builder ────────────────────────────────────────────
function buildHeatmap(actividadDiaria) {
    const WEEKS = 26;
    const today = new Date(); today.setHours(0,0,0,0);
    const start = new Date(today);
    start.setDate(start.getDate() - WEEKS * 7 + 1);
    start.setDate(start.getDate() - start.getDay());
    const cells = [];
    let d = new Date(start);
    while (d <= today) {
        const key = d.toISOString().split('T')[0];
        cells.push({ date: key, count: actividadDiaria[key] || 0, day: new Date(d) });
        d.setDate(d.getDate() + 1);
    }
    const cols = [];
    for (let i = 0; i < cells.length; i += 7) cols.push(cells.slice(i, i + 7));
    const monthNames = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
    let lastMonth = -1;
    const monthLabels = cols.map(col => {
        const m = col[0].day.getMonth();
        if (m !== lastMonth) { lastMonth = m; return monthNames[m]; }
        return '';
    });
    const grid = cols.map(col =>
        `<div class="heatmap-col">${col.map(cell => {
            const cnt = Math.min(cell.count, 5);
            const title = cell.count > 0 ? `${cell.count} informe${cell.count>1?'s':''} — ${cell.date}` : cell.date;
            return `<div class="heatmap-cell" data-count="${cnt}" title="${title}"></div>`;
        }).join('')}</div>`
    ).join('');
    const monthRow = monthLabels.map(l => `<div style="width:14px;font-size:.6rem;color:var(--text3);font-family:'JetBrains Mono',monospace;">${l}</div>`).join('');
    return { grid, monthRow };
}

// ── Avatar emojis disponibles ──────────────────────────────────
const AVATARS = ['📄','🎓','🔬','💡','📚','🧪','💼','🚀','🧠','⚡','🌟','🦉','🏆','🎯','✦','🔭'];
let _currentAvatar = null;

function renderAvatarPicker(currentEmoji) {
    return `<div class="avatar-picker-title">Elige tu avatar</div>${
        AVATARS.map(e => `<div class="avatar-opt${e===currentEmoji?' selected':''}" onclick="selectAvatar('${e}')">${e}</div>`).join('')
    }`;
}

function toggleAvatarPicker() {
    const picker = document.getElementById('avatarPicker');
    picker.classList.toggle('open');
}

function selectAvatar(emoji) {
    _currentAvatar = emoji;
    const av = document.getElementById('pfAvatar');
    if (av) av.textContent = emoji;
    document.querySelectorAll('.avatar-opt').forEach(o => o.classList.toggle('selected', o.textContent === emoji));
    // Guardar inmediatamente
    const u = _getUser();
    if (u) { u.avatar = emoji; localStorage.setItem('arp_user', JSON.stringify(u)); }
    document.getElementById('avatarPicker').classList.remove('open');
}

// Cerrar picker al hacer click fuera
document.addEventListener('click', e => {
    const wrap = document.getElementById('avatarWrap');
    if (wrap && !wrap.contains(e.target)) {
        document.getElementById('avatarPicker')?.classList.remove('open');
    }
});

// ── Password strength ──────────────────────────────────────────
function checkPassStrength(val, barId) {
    const bar = document.getElementById(barId);
    if (!bar) return;
    let s = 0;
    if (val.length >= 8)  s++;
    if (val.length >= 12) s++;
    if (/[A-Z]/.test(val)) s++;
    if (/[0-9]/.test(val)) s++;
    if (/[^A-Za-z0-9]/.test(val)) s++;
    const colors = ['#e05c5c','#f0a030','#d4a843','#52c48a','#52c48a'];
    const widths  = ['20%','40%','60%','80%','100%'];
    bar.style.width      = val.length ? widths[Math.min(s,4)] : '0';
    bar.style.background = val.length ? colors[Math.min(s,4)] : '';
}

function toggleEye(inputId, btn) {
    const inp = document.getElementById(inputId);
    const show = inp.type === 'password';
    inp.type = show ? 'text' : 'password';
    btn.textContent = show ? '🙈' : '👁';
}

            const d = new Date(i.created_at), now = new Date();
            return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();

        const mesNombre = du.success ? du.mes_nombre : '';

        const normasSorted = Object.entries(normaCount).sort((a,b) => b[1]-a[1]);

// ── GUARDAR PERFIL ────────────────────────────────────────────
async function guardarPerfil() {
    if (!user) return;
    const btn = document.getElementById('btnGuardar');
    btn.disabled = true; btn.textContent = 'Guardando...';
    const payload = {
        nombre:         document.getElementById('pNombre').value.trim(),
        ciudad:         document.getElementById('pCiudad').value.trim(),
        telefono:       document.getElementById('pTelefono').value.trim(),
        institucion:    document.getElementById('pInstitucion').value.trim(),
        carrera:        document.getElementById('pCarrera').value.trim(),
        norma_favorita: document.getElementById('pNorma').value,
        nivel_favorito: document.getElementById('pNivel').value,
    };
    try {
        const data = await authFetch('/api/perfil', {
            method: 'PUT',
            body: JSON.stringify(payload)
        });
        if (data.success) {
            const u = _getUser();
            if (u) { u.nombre = payload.nombre; localStorage.setItem('arp_user', JSON.stringify(u)); }
            _showMsg('msgOkPerfil', 'msgErrPerfil', null);
        } else {
            _showMsg('msgOkPerfil', 'msgErrPerfil', data.error || 'No se pudo guardar.');
        }
    } catch(e) {
        _showMsg('msgOkPerfil', 'msgErrPerfil', 'Error de conexión.');
    } finally {
        btn.disabled = false; btn.innerHTML = '💾 Guardar cambios';
    }
}

// ── CAMBIAR CONTRASEÑA ────────────────────────────────────────
async function cambiarPassword() {
    const actual    = document.getElementById('passActual').value;
    const nueva     = document.getElementById('passNueva').value;
    const confirmar = document.getElementById('passConfirmar').value;

    if (!actual)         return _showMsg('msgOkPass','msgErrPass','Ingresa tu contraseña actual.');
    if (nueva.length < 8) return _showMsg('msgOkPass','msgErrPass','La nueva contraseña debe tener al menos 8 caracteres.');
    if (nueva !== confirmar) return _showMsg('msgOkPass','msgErrPass','Las contraseñas no coinciden.');

    const btn = document.getElementById('btnCambiarPass');
    btn.disabled = true; btn.textContent = 'Actualizando...';

    try {
        const data = await authFetch('/api/auth/cambiar-password', {
            method: 'POST',
            body: JSON.stringify({ password_actual: actual, password_nueva: nueva })
        });
        if (data.success) {
            _showMsg('msgOkPass', 'msgErrPass', null);
            document.getElementById('passActual').value    = '';
            document.getElementById('passNueva').value     = '';
            document.getElementById('passConfirmar').value = '';
            document.getElementById('passStrBar').style.width = '0';
            setTimeout(() => { localStorage.removeItem('arp_user'); location.href = '/auth'; }, 2500);
        } else {
            _showMsg('msgOkPass', 'msgErrPass', data.error || 'No se pudo cambiar la contraseña.');
        }
    } catch(e) {
        _showMsg('msgOkPass', 'msgErrPass', 'Error de conexión.');
    } finally {
        btn.disabled = false; btn.innerHTML = '🔒 Actualizar contraseña';
    }
}

// ── ELIMINAR CUENTA ───────────────────────────────────────────
function toggleEliminar() {
    const el = document.getElementById('deleteConfirm');
    el.style.display = el.style.display === 'block' ? 'none' : 'block';
}

async function eliminarCuenta() {
    const emailIngresado = document.getElementById('deleteEmail').value.trim();
    const emailReal = user.email || '';
    if (emailIngresado.toLowerCase() !== emailReal.toLowerCase()) {
        alert('El correo no coincide. Escribe tu correo exacto para confirmar.');
        return;
    }
    const btn = document.getElementById('btnConfirmDelete');
    btn.disabled = true; btn.textContent = 'Eliminando...';
    try {
        const data = await authFetch('/api/cuenta/eliminar', { method: 'DELETE' });
        if (data.success) {
            localStorage.removeItem('arp_user');
            alert('Tu cuenta ha sido eliminada. Lamentamos verte partir.');
            location.href = '/';
        } else {
            btn.disabled = false; btn.textContent = 'Sí, eliminar mi cuenta permanentemente';
            alert(data.error || 'No se pudo eliminar la cuenta. Inténtalo de nuevo.');
        }
    } catch(e) {
        btn.disabled = false; btn.textContent = 'Sí, eliminar mi cuenta permanentemente';
        alert('Error de conexión.');
    }
}

// ── CERRAR SESIÓN ─────────────────────────────────────────────
function cerrarSesion() {
    if (typeof Swal !== 'undefined') {
        Swal.fire({
            title:'¿Cerrar sesión?', icon:'question', showCancelButton:true,
            confirmButtonText:'Sí, salir', cancelButtonText:'Cancelar',
            background:'var(--surface)', color:'var(--text)',
            confirmButtonColor:'#e05c5c', cancelButtonColor:'#3d3c38',
        }).then(r => { if (r.isConfirmed) { localStorage.removeItem('arp_user'); location.href='/'; } });
    } else {
        if (confirm('¿Cerrar sesión?')) { localStorage.removeItem('arp_user'); location.href='/'; }
    }
}

// ── Helper mensajes ───────────────────────────────────────────
function _showMsg(okId, errId, errMsg) {
    const ok  = document.getElementById(okId);
    const err = document.getElementById(errId);
    if (!ok || !err) return;
    if (errMsg) {
        err.textContent = errMsg; err.style.display='block'; ok.style.display='none';
    } else {
        ok.style.display='block'; err.style.display='none';
        setTimeout(() => ok.style.display='none', 3500);
    }
}

cargarPerfil();
</script>
